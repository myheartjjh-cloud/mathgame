<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하늘바다 숫자놀이</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Square+Round:wght@400;700&display=swap');

        :root {
            --cloud-pink: #E0F7FA;
            --main-pink: #81D4FA;
            --deep-pink: #0288D1;
            --sky-blue: #E1F5FE;
            --white: #FFFFFF;
        }

        body {
            font-family: 'NanumSquareRound', sans-serif;
            background: linear-gradient(135deg, #B2EBF2 0%, #E1F5FE 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #phone-container {
            background: var(--white);
            width: 375px;
            height: 667px;
            border-radius: 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(2, 136, 209, 0.3);
            border: 10px solid white;
        }

        .view {
            display: none;
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at top left, #F0FBFF 0%, #FFFFFF 100%);
        }

        .view.active { display: flex; }

        h2 { 
            color: var(--deep-pink); 
            margin-top: 10px; 
            font-family: 'Nanum Pen Script', cursive; 
            font-size: 2.3rem;
            text-shadow: 2px 2px 0px #E1F5FE;
        }

        .card {
            background: var(--white);
            width: 92%;
            padding: 14px 15px;
            border-radius: 25px;
            margin-bottom: 8px;
            border: 3px solid var(--cloud-pink);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 12px rgba(129, 212, 250, 0.2);
            position: relative;
        }
        
        .card::after { 
            content: ''; position: absolute; top: -5px; right: 20px; width: 30px; height: 15px;
            background: white; border-radius: 20px; opacity: 0.8;
        }

        .card:hover { transform: translateY(-3px); }
        .card h3 { margin: 0; color: #01579B; font-size: 1.1rem; }
        .card p { margin: 2px 0 0; font-size: 0.85rem; color: #4FC3F7; }

        .progress-bar-bg { width: 100%; height: 14px; background: #E0F2F1; border-radius: 20px; margin: 15px 0; border: 2px solid white; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #81D4FA, #0288D1); border-radius: 20px; transition: 0.5s; }
        
        .q-text { font-size: 3.5rem; font-weight: bold; color: #37474F; margin: 25px 0; text-shadow: 3px 3px 0px var(--cloud-pink); }
        .ans-input { width: 60%; font-size: 2.5rem; border: 5px solid var(--main-pink); border-radius: 25px; text-align: center; outline: none; background: #F4FDFF; color: var(--deep-pink); }
        
        #wrong-msg { color: var(--deep-pink); margin-top: 10px; font-weight: bold; visibility: hidden; }

        #calc-display { width: 100%; height: 70px; background: #F0F9FF; border-radius: 20px; font-size: 1.8rem; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; box-sizing: border-box; margin-bottom: 15px; color: #0277BD; border: 3px solid var(--cloud-pink); }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .calc-btn { padding: 12px 0; font-size: 1.2rem; border-radius: 18px; border: none; background: white; border-bottom: 4px solid #E1F5FE; cursor: pointer; font-weight: bold; color: #546E7A; }
        .calc-btn.op { background: var(--cloud-pink); color: var(--deep-pink); border-bottom-color: #B3E5FC; }

        .tab-bar { height: 75px; background: #fff; display: flex; border-top: 2px solid #E1F5FE; padding-bottom: 45px; }
        .tab-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; color: #B3E5FC; }
        .tab-item.active { color: var(--deep-pink); }
        .tab-icon { font-size: 1.5rem; margin-bottom: 2px; }

        .profile-input { width: 80%; padding: 15px; font-size: 1.2rem; border: 3px solid var(--cloud-pink); border-radius: 20px; text-align: center; margin-bottom: 20px; outline: none; }
        .save-btn { background: var(--deep-pink); color: white; border: none; padding: 15px 40px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }

        #feedback-pop { position: absolute; top: 40%; font-size: 6rem; display: none; z-index: 999; animation: pop 0.8s ease forwards; }
        @keyframes pop { 0%{transform:scale(0) rotate(-20deg); opacity:0} 50%{transform:scale(1.2) rotate(10deg); opacity:1} 100%{transform:scale(1) rotate(0deg); opacity:0} }
    </style>
</head>
<body>

<div id="phone-container">
    <div id="feedback-pop">🫧</div>

    <div id="view-home" class="view active">
        <h2 id="home-title">🐳 소현이의 숫자놀이 🐬</h2>
        <div id="op-list" style="width:100%; margin-top: 5px;">
            <button class="card" onclick="showLevels('+')"><h3>🌊 보글보글 덧셈 (+)</h3><p>물방울이 모여 커져요</p></button>
            <button class="card" style="border-color:#C8E6C9" onclick="showLevels('-')"><h3>🐚 슝슝 뺄셈 (-)</h3><p>조개가 하나씩 사라져요</p></button>
            <button class="card" style="border-color:#FFE0B2" onclick="showLevels('*')"><h3>🦀 쑥쑥 곱셈 (×)</h3><p>게들이 옆으로 줄을 서요</p></button>
            <button class="card" style="border-color:#D1C4E9" onclick="showLevels('/')"><h3>🐳 톡톡 나눗셈 (÷)</h3><p>고래가 물줄기를 나눠요</p></button>
        </div>
        
        <div id="level-list" style="display:none; width:100%">
            <h3 style="color:var(--deep-pink); margin-bottom: 15px;">어떤 바다로 갈까요?</h3>
            <button class="card" onclick="startGame(1)"><h3>🫧 얕은 바다</h3><p id="desc1"></p></button>
            <button class="card" onclick="startGame(2)"><h3>🌊 파도 바다</h3><p id="desc2"></p></button>
            <button class="card" onclick="startGame(3)"><h3>🔱 깊은 바다</h3><p id="desc3"></p></button>
            <button onclick="backToOp()" style="border:none; background:none; color:#4FC3F7; text-decoration:underline; margin-top:10px; cursor:pointer;">뒤로가기</button>
        </div>
    </div>

    <div id="view-game" class="view">
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
        <div style="font-weight:bold; color:#4FC3F7; font-size: 1rem;"><span id="cur-count">1</span> / 10 문제</div>
        <div class="q-text" id="q-display">0 + 0</div>
        <input type="number" id="ans-input" class="ans-input" inputmode="numeric" onkeyup="handleInput()">
        <div id="wrong-msg">힝~ㅠ 다시 한번 해볼까? 🤿</div>
    </div>

    <div id="view-result" class="view">
        <h2 style="font-size: 2.2rem;" id="result-title">지혜의 보석 획득!</h2>
        <div id="reward-icon" style="font-size: 5.5rem; margin: 15px;">💎</div>
        <div style="background: #E1F5FE; padding: 15px; border-radius: 20px; width: 90%; margin-bottom: 15px;">
            <p id="praise-msg" style="font-weight:bold; color:#01579B; font-size: 1.1rem; margin: 0;"></p>
            <p style="color:#0288D1; margin-top: 5px; font-size: 0.9rem;">
                숫자 실력이 <span id="score-text" style="font-weight:bold; font-size: 1.3rem;">0</span>칸 더 똑똑해졌어요!
            </p>
        </div>
        <button class="card" onclick="switchView('home')" style="background:var(--main-pink); border:none; color:white;"><h3>한 번 더 탐험하기</h3></button>
    </div>

    <div id="view-calc" class="view">
        <h2 style="font-size: 2rem;">☁️ 구름 계산기 ☁️</h2>
        <div id="calc-display">0</div>
        <div class="calc-grid">
            <button class="calc-btn" onclick="cIn('7')">7</button>
            <button class="calc-btn" onclick="cIn('8')">8</button>
            <button class="calc-btn" onclick="cIn('9')">9</button>
            <button class="calc-btn op" onclick="cIn('/')">÷</button>
            <button class="calc-btn" onclick="cIn('4')">4</button>
            <button class="calc-btn" onclick="cIn('5')">5</button>
            <button class="calc-btn" onclick="cIn('6')">6</button>
            <button class="calc-btn op" onclick="cIn('*')">×</button>
            <button class="calc-btn" onclick="cIn('1')">1</button>
            <button class="calc-btn" onclick="cIn('2')">2</button>
            <button class="calc-btn" onclick="cIn('3')">3</button>
            <button class="calc-btn op" onclick="cIn('-')">-</button>
            <button class="calc-btn" onclick="cClear()">C</button>
            <button class="calc-btn" onclick="cIn('0')">0</button>
            <button class="calc-btn op" onclick="cSolve()">=</button>
            <button class="calc-btn op" onclick="cIn('+')">+</button>
        </div>
    </div>

    <div id="view-profile" class="view">
        <h2 style="font-size: 2rem;">🐚 내 프로필 설정 🐚</h2>
        <div style="margin-top: 50px; width: 100%;">
            <p style="color: var(--deep-pink); font-weight: bold;">이름을 입력해 주세요!</p>
            <input type="text" id="name-input" class="profile-input" placeholder="이름을 입력하세요">
            <br>
            <button class="save-btn" onclick="saveProfile()">저장하기</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-home" onclick="switchTab('home')">
            <span class="tab-icon">🏝️</span><span>공부방</span>
        </div>
        <div class="tab-item" id="tab-calc" onclick="switchTab('calc')">
            <span class="tab-icon">☁️</span><span>구름계산기</span>
        </div>
        <div class="tab-item" id="tab-profile" onclick="switchTab('profile')">
            <span class="tab-icon">👤</span><span>프로필</span>
        </div>
    </div>
</div>

<script>
    let curOp = '', curLv = 1, curAns = 0;
    let probIdx = 0, score = 0, cExpr = '';
    let userName = localStorage.getItem('userName') || '소현이';

    // 초기 이름 설정
    window.onload = function() {
        updateNameUI();
    };

    function updateNameUI() {
        document.getElementById('home-title').innerText = `🐳 ${userName}의 숫자놀이 🐬`;
        document.getElementById('name-input').value = userName;
    }

    function saveProfile() {
        const inputName = document.getElementById('name-input').value.trim();
        if(inputName) {
            userName = inputName;
            localStorage.setItem('userName', userName);
            updateNameUI();
            alert('이름이 저장되었습니다! 🎉');
            switchTab('home');
        } else {
            alert('이름을 입력해 주세요!');
        }
    }

    // APK/오프라인용 소리 설정 (파일이 폴더 내에 있어야 함)
    // 없을 경우 에러로 앱이 멈추지 않도록 play() 시에 catch 처리 추가
    const soundCorrect = new Audio('correct.mp3');
    const soundWrong = new Audio('wrong.mp3');

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') {
            document.getElementById('op-list').style.display = 'block';
            document.getElementById('level-list').style.display = 'none';
        }
    }

    function switchTab(type) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        if(type === 'home') {
            switchView('home');
            document.getElementById('tab-home').classList.add('active');
        } else if(type === 'calc') {
            switchView('calc');
            document.getElementById('tab-calc').classList.add('active');
        } else if(type === 'profile') {
            switchView('profile');
            document.getElementById('tab-profile').classList.add('active');
        }
    }

    function showLevels(op) {
        curOp = op;
        document.getElementById('op-list').style.display = 'none';
        document.getElementById('level-list').style.display = 'block';
        const d = {
            '+':['1자리 + 1자리','2자리 + 1자리','2자리 + 2자리'],
            '-':['1자리 - 1자리','2자리 - 1자리','2자리 - 2자리'],
            '*':['2~5단 기초','6~9단 보통','랜덤 구구단'],
            '/':['기초 나누기','보통 나누기','심화 나누기']
        };
        for(let i=1; i<=3; i++) document.getElementById('desc'+i).innerText = d[op][i-1];
    }

    function backToOp() {
        document.getElementById('op-list').style.display = 'block';
        document.getElementById('level-list').style.display = 'none';
    }

    function startGame(lv) {
        curLv = lv; probIdx = 0; score = 0;
        switchView('game');
        nextProb();
    }

    function nextProb() {
        probIdx++;
        if(probIdx > 10) return endMove();
        document.getElementById('cur-count').innerText = probIdx;
        document.getElementById('progress-fill').style.width = (probIdx * 10) + '%';
        document.getElementById('wrong-msg').style.visibility = 'hidden';
        
        let n1, n2;
        while(true) {
            if(curOp==='+'){
                if(curLv==1){n1=r(1,9); n2=r(1,9);} 
                else if(curLv==2){n1=r(10,99); n2=r(1,9);} 
                else {n1=r(10,99); n2=r(10,99);}
                curAns = n1 + n2;
            } else if(curOp==='-'){
                if(curLv==1){n1=r(2,9); n2=r(1,n1-1);} 
                else if(curLv==2){n1=r(11,99); n2=r(1,9);} 
                else {n1=r(21,99); n2=r(10,n1-1);}
                curAns = n1 - n2;
            } else if(curOp==='*'){
                if(curLv==1){n1=r(2,5); n2=r(1,9);} 
                else if(curLv==2){n1=r(6,9); n2=r(1,9);} 
                else {n1=r(2,9); n2=r(2,9);}
                curAns = n1 * n2;
            } else {
                n2 = r(2,9); curAns = r(1,9); n1 = n2 * curAns;
            }
            if(curAns !== 0) break;
        }

        const s = {'+':'+','-':'-','*':'×','/':'÷'}[curOp];
        document.getElementById('q-display').innerText = `${n1} ${s} ${n2}`;
        document.getElementById('ans-input').value = '';
        document.getElementById('ans-input').focus();
    }

    function r(a, b) { return Math.floor(Math.random()*(b-a+1))+a; }

    function handleInput() {
        const v = document.getElementById('ans-input').value;
        if(v.length >= curAns.toString().length) {
            if(parseInt(v) === curAns) {
                score++;
                soundCorrect.play().catch(() => {}); // 소리 파일 없어도 무시
                popEffect();
                setTimeout(nextProb, 600);
            } else {
                soundWrong.play().catch(() => {});
                document.getElementById('wrong-msg').style.visibility = 'visible';
            }
        }
    }

    function popEffect() {
        const p = document.getElementById('feedback-pop');
        const emojis = ['🫧','🌊','🐬','🐚','🐳','✨'];
        p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        p.style.display = 'block';
        setTimeout(() => { p.style.display = 'none'; }, 800);
    }

    function endMove() {
        switchView('result');
        document.getElementById('score-text').innerText = score;
        
        const icon = document.getElementById('reward-icon');
        const msg = document.getElementById('praise-msg');
        const title = document.getElementById('result-title');

        if(score === 10) {
            title.innerText = "황금 훈장 획득!";
            icon.innerText = "🏅";
            msg.innerText = `대단해 ${userName}! 머릿속이 바다처럼 넓고 깊어졌어! 🔱`;
        } else if(score >= 7) {
            title.innerText = "무지개 보석 획득!";
            icon.innerText = "💎";
            msg.innerText = "우와! 지혜의 빛이 반짝반짝! 정말 똑똑해졌어! ✨";
        } else {
            title.innerText = "지혜의 열쇠 획득!";
            icon.innerText = "🔑";
            msg.innerText = "조금만 더 하면 바다 왕관도 쓸 수 있겠어! 화이팅! 🌊";
        }
    }

    function cIn(v) { cExpr += v; uC(); }
    function cClear() { cExpr = ''; uC(); }
    function cSolve() { try { cExpr = eval(cExpr.replace(/×/g,'*').replace(/÷/g,'/')).toString(); } catch { cExpr = 'Error'; } uC(); }
    function uC() { document.getElementById('calc-display').innerText = cExpr || '0'; }
</script>
</body>
</html>
